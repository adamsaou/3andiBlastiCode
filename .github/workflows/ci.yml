name: CI – Build & Lint Check

# Runs on every push to any branch, and on all PRs targeting master.
# Purpose: catch compilation errors before Adam reviews.
on:
  push:
    branches-ignore:
      - master          # pushes directly to master are not expected; PRs only
  pull_request:
    branches:
      - master

jobs:
  build:
    name: Gradle Build Check
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Java 17 (required by AGP 8.x) ──────────────────────────────────
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      # ── 3. Android SDK ─────────────────────────────────────────────────────
      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      # ── 4. Gradle cache (speeds up subsequent runs) ────────────────────────
      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      # ── 5. Grant execute permission ────────────────────────────────────────
      - name: Make gradlew executable
        run: chmod +x gradlew

      # ── 6. Build (debug) ───────────────────────────────────────────────────
      # assembleDebug compiles ALL modules — fails fast on any Java error.
      - name: Build TeamCode (debug)
        run: ./gradlew :TeamCode:assembleDebug --no-daemon --stacktrace

      # ── 7. Optional: upload APK as artifact for quick testing ──────────────
      - name: Upload debug APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: TeamCode-debug-${{ github.sha }}
          path: TeamCode/build/outputs/apk/debug/*.apk
          retention-days: 7
